[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduinoer

# Tämä varmistaa, että VS Coden monitori käyttää oikeaa nopeutta oletuksena
monitor_speed = 115200

# Nämä ovat välttämättömiä Superminille:
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino @ 1.4.1
    https://github.com/arduino-libraries/Arduino_BMI270_BMM150.git


# Nämä kaksi ovat usein avainasemassa PermissionErrorin välttämisessä:
monitor_dtr = 0
monitor_rts = 0
# Tämä estää monitoria yrittämästä liian nopeasti uudelleen:
monitor_filters = default, log2file